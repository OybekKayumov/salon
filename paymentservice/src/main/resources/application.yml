server:
  port: 5006

spring:
  application:
    name: paymentservice
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3307/paymentdb
    username: root
    password: testtest
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

razorpay:
  api:
    key: "your razorpay api key"
    secret: "your razorpay api secret"

stripe:
  api:
    key: "your stripe api key"

eureka:
  instance:
    prefer-ip-address: true
  #      hostname: localhost
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8070/eureka/